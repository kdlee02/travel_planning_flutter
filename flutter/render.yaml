# Render Blueprint for Seoul Travel Buddy.
#
# Repo root is expected to be `webapp/` (the directory containing this
# folder's parent). Paths below are written relative to that root.
#
# On first deploy:
#   1. Push the repo to GitHub.
#   2. In Render: New + → Blueprint → pick this repo.
#   3. Render reads this file, creates the two services below.
#   4. Set the secrets it asks for (GEMINI_API_KEY, GOOGLE_API_KEY).
#   5. Wait for the build, then visit the frontend URL.

services:
  # ── Backend: FastAPI on Render's native Python runtime (no Docker) ──
  - type: web
    name: seoul-buddy-api
    runtime: python
    region: oregon        # closest free-tier US region; change if you prefer
    plan: free            # cold starts after ~15 min idle on free tier
    rootDir: .            # repo root (webapp/)
    buildCommand: pip install -r flutter/backend/requirements.txt
    startCommand: cd flutter/backend && python -m uvicorn api:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /healthz
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.4
      # Secret — paste the same key into both fields in the Render UI.
      - key: GEMINI_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      # Set this manually in the Render dashboard to the static-site's
      # full URL, e.g. https://seoul-buddy-web.onrender.com .
      #
      # We deliberately don't use `fromService` here: Render's `host`
      # property for cross-service references in Blueprints returns the
      # short service name (e.g. "seoul-buddy-web") instead of the FQDN,
      # which silently breaks CORS once deployed.
      - key: FRONTEND_ORIGIN
        sync: false

  # ── Frontend: Flutter web as a Render Static Site ──
  # Static sites are served from Render's global CDN, so no `region` field.
  - type: web
    name: seoul-buddy-web
    runtime: static
    rootDir: flutter/frontend
    buildCommand: ./render-build.sh
    staticPublishPath: build/web
    # Send unknown URLs back to index.html so Flutter's client-side
    # routing works (e.g. if you ever add named routes).
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      # Set this manually in the Render dashboard to the API service's
      # public hostname WITHOUT scheme, e.g. seoul-buddy-api.onrender.com.
      #
      # We avoid `fromService` here because Render's `host` property for
      # cross-service references in Blueprints returns the short service
      # name (e.g. "seoul-buddy-api"), not the FQDN — that gets baked
      # into the Flutter build and every API call fails.
      - key: API_BASE_HOST
        sync: false
