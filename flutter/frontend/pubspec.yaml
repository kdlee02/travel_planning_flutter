name: travel_planner
description: AI Travel Planner – Flutter frontend

publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # HTTP client
  http: ^1.2.2
  http_parser: ^4.1.2

  # State management
  provider: ^6.1.2

  # Nice icons
  cupertino_icons: ^1.0.8

  # Lens (camera + image upload)
  camera: ^0.12.0+1
  image_picker: ^1.2.2

  # Open source URLs in the user's browser
  url_launcher: ^6.3.0

  # Save the generated itinerary as a JSON file (web/desktop/mobile)
  file_saver: ^0.2.14

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
