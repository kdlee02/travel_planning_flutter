<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>✈️ AI Travel Planner</title>
  <style>
    /* ── Reset & base ─────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #f0f4f8;
      --surface:   #ffffff;
      --primary:   #1a73e8;
      --primary-dk:#1558b0;
      --on-primary:#ffffff;
      --bubble-ai: #e8edf2;
      --bubble-usr:#1a73e8;
      --text:      #1f2937;
      --text-muted:#6b7280;
      --border:    #d1d5db;
      --green:     #16a34a;
      --orange:    #d97706;
      --radius:    14px;
      --shadow:    0 4px 24px rgba(0,0,0,.08);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* ── Layout shell ─────────────────────────────────────────────────────── */
    .shell {
      width: 100%;
      max-width: 820px;
      height: 100dvh;
      max-height: 820px;
      display: flex;
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    /* ── Sidebar ──────────────────────────────────────────────────────────── */
    .sidebar {
      width: 240px;
      flex-shrink: 0;
      background: #f8fafc;
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 20px 16px;
      gap: 12px;
    }

    .sidebar h2 {
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--text-muted);
      margin-bottom: 4px;
    }

    .field-card {
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 13px;
      border: 1px solid transparent;
      transition: background .2s;
    }
    .field-card.filled {
      background: #dcfce7;
      border-color: #86efac;
      color: var(--green);
    }
    .field-card.empty {
      background: #fff7ed;
      border-color: #fcd34d;
      color: var(--orange);
    }
    .field-card .label { font-weight: 600; display: block; margin-bottom: 2px; }
    .field-card .value { opacity: .85; }

    .sidebar-spacer { flex: 1; }

    .btn-restart {
      width: 100%;
      padding: 9px;
      border: none;
      border-radius: 8px;
      background: #fee2e2;
      color: #b91c1c;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s;
    }
    .btn-restart:hover { background: #fecaca; }

    /* ── Chat panel ───────────────────────────────────────────────────────── */
    .chat-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    /* Header */
    .chat-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .chat-header .avatar {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: var(--primary);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    .chat-header .title { font-weight: 700; font-size: 16px; }
    .chat-header .subtitle { font-size: 12px; color: var(--text-muted); }

    /* Confirmation banner */
    #confirm-banner {
      display: none;
      background: #dcfce7;
      color: var(--green);
      text-align: center;
      padding: 10px;
      font-weight: 600;
      font-size: 14px;
      border-bottom: 1px solid #86efac;
    }

    /* Messages */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px 12px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      scroll-behavior: smooth;
    }

    .bubble-row {
      display: flex;
      align-items: flex-end;
      gap: 8px;
    }
    .bubble-row.user  { flex-direction: row-reverse; }

    .bubble {
      max-width: 72%;
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .bubble.ai   { background: var(--bubble-ai); border-bottom-left-radius: 4px; }
    .bubble.user { background: var(--bubble-usr); color: var(--on-primary); border-bottom-right-radius: 4px; }

    /* Typing indicator */
    .typing {
      display: flex; align-items: center; gap: 4px;
      padding: 10px 14px;
      background: var(--bubble-ai);
      border-radius: 16px;
      border-bottom-left-radius: 4px;
      width: fit-content;
    }
    .typing span {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--text-muted);
      animation: bounce 1.2s infinite;
    }
    .typing span:nth-child(2) { animation-delay: .2s; }
    .typing span:nth-child(3) { animation-delay: .4s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40%           { transform: translateY(-6px); }
    }

    /* Input bar */
    .input-bar {
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 8px;
      align-items: center;
    }
    #msg-input {
      flex: 1;
      padding: 10px 16px;
      border: 1px solid var(--border);
      border-radius: 24px;
      font-size: 14px;
      outline: none;
      background: #f9fafb;
      transition: border-color .15s;
    }
    #msg-input:focus { border-color: var(--primary); background: #fff; }
    #msg-input:disabled { opacity: .5; cursor: not-allowed; }

    #send-btn {
      width: 40px; height: 40px;
      border: none; border-radius: 50%;
      background: var(--primary);
      color: #fff;
      font-size: 18px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .15s;
      flex-shrink: 0;
    }
    #send-btn:hover:not(:disabled) { background: var(--primary-dk); }
    #send-btn:disabled { opacity: .4; cursor: not-allowed; }

    /* ── Responsive: hide sidebar on small screens ────────────────────────── */
    @media (max-width: 580px) {
      .shell { border-radius: 0; max-height: 100dvh; }
      .sidebar { display: none; }
    }
  </style>
</head>
<body>

<div class="shell">

  <!-- ── Sidebar ─────────────────────────────────────────────────────────── -->
  <aside class="sidebar">
    <h2>📋 Trip Details</h2>

    <div class="field-card empty" id="card-duration">
      <span class="label">📅 Duration</span>
      <span class="value" id="val-duration">Not provided</span>
    </div>
    <div class="field-card empty" id="card-location">
      <span class="label">📍 Destination</span>
      <span class="value" id="val-location">Not provided</span>
    </div>
    <div class="field-card empty" id="card-budget">
      <span class="label">💰 Budget</span>
      <span class="value" id="val-budget">Not provided</span>
    </div>
    <div class="field-card empty" id="card-dietary">
      <span class="label">🥗 Dietary</span>
      <span class="value" id="val-dietary">Not provided</span>
    </div>
    <div class="field-card empty" id="card-purpose">
      <span class="label">🎯 Purpose</span>
      <span class="value" id="val-purpose">Not provided</span>
    </div>

    <div class="sidebar-spacer"></div>
    <button class="btn-restart" onclick="restart()">🔄 Restart</button>
  </aside>

  <!-- ── Chat panel ──────────────────────────────────────────────────────── -->
  <div class="chat-panel">

    <div class="chat-header">
      <div class="avatar">✈️</div>
      <div>
        <div class="title">AI Travel Planner</div>
        <div class="subtitle">Powered by Gemini</div>
      </div>
    </div>

    <div id="confirm-banner">🎉 Your travel plan is confirmed!</div>

    <div id="messages"></div>

    <div class="input-bar">
      <input
        id="msg-input"
        type="text"
        placeholder="Type your message…"
        autocomplete="off"
        onkeydown="if(event.key==='Enter') sendMessage()"
      />
      <button id="send-btn" onclick="sendMessage()" title="Send">
        &#9658;
      </button>
    </div>

  </div>
</div>

<script>
  const API = 'http://localhost:8000';
  let threadId = 'travel-session-1';
  let confirmed = false;

  // ── DOM refs ───────────────────────────────────────────────────────────────
  const messagesEl = document.getElementById('messages');
  const inputEl    = document.getElementById('msg-input');
  const sendBtn    = document.getElementById('send-btn');
  const banner     = document.getElementById('confirm-banner');

  const FIELDS = ['duration', 'location', 'budget', 'dietary', 'purpose'];

  // ── Boot ───────────────────────────────────────────────────────────────────
  window.addEventListener('DOMContentLoaded', () => init());

  async function init() {
    setLoading(true);
    try {
      const state = await callChat(null);   // null → greeting
      applyState(state);
    } catch(e) {
      setLoading(false);
      appendBubble('⚠️ Could not reach the backend.\n\nMake sure you ran:\n  uvicorn api:app --reload --port 8000\nfrom the flutter/backend folder.\n\nError: ' + e.message, 'ai');
      return;   // ← stop here, do NOT loop
    }
    setLoading(false);
  }

  // ── Send ───────────────────────────────────────────────────────────────────
  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || confirmed) return;

    inputEl.value = '';
    appendBubble(text, 'user');
    setLoading(true);

    try {
      const state = await callChat(text);
      applyState(state);
    } catch(e) {
      appendBubble('⚠️ Error: ' + e.message, 'ai');
    }
    setLoading(false);
  }

  // ── Restart ────────────────────────────────────────────────────────────────
  async function restart() {
    await fetch(`${API}/reset?thread_id=${threadId}`, { method: 'POST' }).catch(()=>{});
    messagesEl.innerHTML = '';
    confirmed = false;
    banner.style.display = 'none';
    FIELDS.forEach(f => updateCard(f, null));
    init();
  }

  // ── API call ───────────────────────────────────────────────────────────────
  async function callChat(message) {
    const res = await fetch(`${API}/chat`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ thread_id: threadId, message }),
    });
    if (!res.ok) {
      let detail = `Server error ${res.status}`;
      try { detail = (await res.json()).detail || detail; } catch(_) {}
      throw new Error(detail);
    }
    return res.json();
  }

  // ── Apply state from backend ───────────────────────────────────────────────
  function applyState(state) {
    if (state.reply) appendBubble(state.reply, 'ai');

    FIELDS.forEach(f => updateCard(f, state[f]));

    if (state.confirmed && !confirmed) {
      confirmed = true;
      banner.style.display = 'block';
      inputEl.disabled = true;
      sendBtn.disabled = true;
      inputEl.placeholder = 'Completed.';
    }
  }

  // ── UI helpers ─────────────────────────────────────────────────────────────
  function appendBubble(text, role) {
    // Remove typing indicator if present
    const typing = document.getElementById('typing');
    if (typing) typing.remove();

    const row = document.createElement('div');
    row.className = `bubble-row ${role}`;

    const bubble = document.createElement('div');
    bubble.className = `bubble ${role}`;
    bubble.textContent = text;

    row.appendChild(bubble);
    messagesEl.appendChild(row);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function setLoading(on) {
    inputEl.disabled  = on || confirmed;
    sendBtn.disabled  = on || confirmed;

    const existing = document.getElementById('typing');
    if (on && !existing) {
      const row = document.createElement('div');
      row.className = 'bubble-row ai';
      row.id = 'typing';
      row.innerHTML = `
        <div class="typing">
          <span></span><span></span><span></span>
        </div>`;
      messagesEl.appendChild(row);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    } else if (!on && existing) {
      existing.remove();
    }
  }

  function updateCard(field, value) {
    const card = document.getElementById(`card-${field}`);
    const val  = document.getElementById(`val-${field}`);
    if (!card || !val) return;
    if (value) {
      val.textContent = value;
      card.className = 'field-card filled';
    } else {
      val.textContent = 'Not provided';
      card.className = 'field-card empty';
    }
  }
</script>

</body>
</html>
